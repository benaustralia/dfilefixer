<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#e02418">
<meta name="description" content="Diane's File Fixer restores missing or wrong file extensions by inspecting file contents — runs entirely in your browser, no upload, no server.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<title>Diane's File Fixer</title>

<!-- Self-hosted FilePond (PQINA, MIT, v4.32.12) — CSS loaded async so it doesn't
     block render of the card + title. JS is deferred. -->
<link rel="preload" as="style" href="vendor/filepond.min.css" onload="this.rel='stylesheet'">
<link rel="preload" as="style" href="filepond-init.css"       onload="this.rel='stylesheet'">
<noscript>
  <link rel="stylesheet" href="vendor/filepond.min.css">
  <link rel="stylesheet" href="filepond-init.css">
</noscript>
<script defer src="vendor/filepond.min.js"></script>
<script defer src="filepond-init.js"></script>

<!-- Self-hosted Orbitron subset for curved title. Swap-displayed so no FOIT. -->
<style>
  @font-face {
    font-family: "Orbitron";
    font-style: normal;
    font-weight: 500 900;
    font-display: swap;
    src: url("vendor/orbitron.woff2") format("woff2");
  }
</style>

<style>
  :root {
    --card: min(520px, 92vmin);
    /* Mid-gray for the dashed drop-zone ring + default drop-icon; must show on the white card. */
    --border-strong: rgba(15,17,21,0.28);
    --muted: #5b6472;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    color: #f3f5f8;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    min-height: 100vh;
    background-color: #000;
    background-image: radial-gradient(circle at center,
      #e02418 0,
      #e02418 calc(var(--card) / 4),
      #a0140d calc(var(--card) / 4),
      #a0140d calc(var(--card) / 2),
      #6b0e0a calc(var(--card) / 2),
      #6b0e0a calc(var(--card) * 3 / 4),
      #3d0808 calc(var(--card) * 3 / 4),
      #3d0808 var(--card),
      #1a0303 var(--card),
      #1a0303 calc(var(--card) * 5 / 4),
      #000 calc(var(--card) * 5 / 4)
    );
    background-attachment: fixed;
  }
  /* Narrow portrait viewports (mobile) get a vertically elongated bullseye so
     the rings hug the tall shape. Half-screen desktop (e.g. 960×1080) stays
     circular — the card-anchored radial-gradient already keeps it proportional. */
  @media (max-aspect-ratio: 3/4) {
    body {
      background-image: radial-gradient(ellipse 70% 50% at center,
        #e02418 0,
        #e02418 calc(var(--card) / 4),
        #a0140d calc(var(--card) / 4),
        #a0140d calc(var(--card) / 2),
        #6b0e0a calc(var(--card) / 2),
        #6b0e0a calc(var(--card) * 3 / 4),
        #3d0808 calc(var(--card) * 3 / 4),
        #3d0808 var(--card),
        #1a0303 var(--card),
        #1a0303 calc(var(--card) * 5 / 4),
        #000 calc(var(--card) * 5 / 4)
      );
    }
  }
  .card { position: relative; z-index: 1; }
  .credit {
    position: fixed;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    font-size: 10px; color: rgba(255,255,255,0.65);
    text-decoration: none;
    letter-spacing: 0.02em;
  }
  .credit:hover { color: rgba(255,255,255,0.95); }
  .card {
    width: var(--card);
    height: var(--card);
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50%;
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    box-shadow: 0 20px 80px -10px rgba(0,0,0,0.7),
                0 0 0 1px rgba(255,255,255,0.05) inset;
    color: #0f1115;
    overflow: hidden;
  }
  /* Both the H1 and the drop zone are absolutely centered on the card.
     The H1 SVG is the same size as the card and contains a half-circle arc
     concentric with the drop zone — text wraps around the drop zone perimeter
     like a vinyl record label. */
  .card > h1,
  .card > .filepond--root {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .card > h1 {
    width: var(--card);
    height: var(--card);
    pointer-events: none;
  }
  h1 {
    margin: 0; padding: 0;
    display: block;
    line-height: 0;
  }
  .h1-curve {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }
  .h1-curve text {
    font-family: "Orbitron", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 30px;
    font-weight: 900;
    fill: #0f1115;
    letter-spacing: 0.5px;
  }
  /* Feedback text below the drop zone, inside the circular card.
     Both the primary message and the ::after hint are centered on the
     same vertical axis — text-align on the .status box plus left:50% /
     translateX(-50%) anchors the box centrally under the drop zone. */
  .status {
    position: absolute;
    left: 50%;
    top: 78%;
    transform: translateX(-50%);
    font-family: "Orbitron", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-align: center;
    color: transparent;
    transition: color 250ms ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .status.done { color: #2e8540; }
  .status.fail { color: #c41a10; }
  /* Secondary hint shown under every red message. */
  .status.fail::after {
    content: "Try once more?";
    display: block;
    margin-top: 3px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.03em;
    opacity: 0.75;
  }
</style>
</head>
<body>
  <a class="credit" href="https://www.svgbackgrounds.com/" target="_blank" rel="noopener">Bullseye Gradient by SVGBackgrounds.com</a>

  <main class="card">
    <h1>
      <svg class="h1-curve" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg" aria-label="Diane's File Fixer">
        <defs>
          <!-- Half-circle arc concentric with drop zone (cx=260, cy=260) at radius 175.
               Drop zone radius is 140; the title sits in a 35px-wide ring around it. -->
          <path id="title-arc" d="M 85 260 A 175 175 0 0 1 435 260" fill="none"/>
        </defs>

        <!-- Tractor outer transform is set at runtime by the positioner so the phrase
             [tractor][space]Diane's File Fixer is mathematically centered on the arc.
             Inner translate(-32 -32) scale(0.95) is locked artwork — do not touch. -->
        <g class="tractor" transform="translate(97.4 195.0) rotate(-68) translate(-32 -32) scale(0.95)" aria-hidden="true">
          <rect x="17" y="12" width="4" height="12" rx="0.5" fill="#8a1a14"/>
          <rect x="20" y="16" width="16" height="14" rx="2" fill="#e02418"/>
          <rect x="22" y="18" width="12" height="9" rx="1" fill="#ffe9a8" opacity="0.9"/>
          <rect x="14" y="28" width="40" height="14" rx="3" fill="#e02418"/>
          <rect x="40" y="22" width="14" height="10" rx="2" fill="#c41a10"/>
          <circle cx="52" cy="27" r="1.6" fill="#ffe9a8"/>
          <circle cx="20" cy="46" r="11" fill="#1a1a1a"/>
          <circle cx="20" cy="46" r="5" fill="#e02418"/>
          <circle cx="20" cy="46" r="1.6" fill="#1a1a1a"/>
          <circle cx="48" cy="48" r="7" fill="#1a1a1a"/>
          <circle cx="48" cy="48" r="3" fill="#e02418"/>
          <circle cx="48" cy="48" r="1" fill="#1a1a1a"/>
        </g>

        <!-- Curved title text wraps around the upper half of the drop zone.
             startOffset is overwritten by the positioner once Orbitron has loaded. -->
        <text text-anchor="middle">
          <textPath href="#title-arc" startOffset="55%">Diane's File Fixer</textPath>
        </text>
      </svg>
    </h1>

    <input type="file" class="filepond" id="picker" aria-label="Choose files to fix" multiple>
    <div class="status" role="status" aria-live="polite"></div>
  </main>

<script>
// ---------- Magic byte signatures ----------
const SIGS = [
  { ext: "jpg",  test: b => b[0]===0xFF && b[1]===0xD8 && b[2]===0xFF },
  { ext: "png",  test: b => b[0]===0x89 && b[1]===0x50 && b[2]===0x4E && b[3]===0x47 && b[4]===0x0D && b[5]===0x0A && b[6]===0x1A && b[7]===0x0A },
  { ext: "gif",  test: b => b[0]===0x47 && b[1]===0x49 && b[2]===0x46 && b[3]===0x38 && (b[4]===0x37||b[4]===0x39) && b[5]===0x61 },
  { ext: "webp", test: b => b[0]===0x52 && b[1]===0x49 && b[2]===0x46 && b[3]===0x46 && b[8]===0x57 && b[9]===0x45 && b[10]===0x42 && b[11]===0x50 },
  { ext: "bmp",  test: b => b[0]===0x42 && b[1]===0x4D },
  { ext: "tiff", test: b => (b[0]===0x49 && b[1]===0x49 && b[2]===0x2A && b[3]===0x00) || (b[0]===0x4D && b[1]===0x4D && b[2]===0x00 && b[3]===0x2A) },
  { ext: null,   test: b => b[4]===0x66 && b[5]===0x74 && b[6]===0x79 && b[7]===0x70,
    resolve: function(b) {
      const brand = String.fromCharCode(b[8],b[9],b[10],b[11]).toLowerCase();
      if (brand.startsWith("hei") || brand === "mif1" || brand === "msf1") return "heic";
      if (brand.startsWith("qt"))   return "mov";
      if (brand === "m4a ") return "m4a";
      if (brand === "m4v ") return "m4v";
      return "mp4";
    }
  },
  { ext: "mp3",  test: b => (b[0]===0x49 && b[1]===0x44 && b[2]===0x33) || (b[0]===0xFF && (b[1]&0xE0)===0xE0) },
  { ext: "wav",  test: b => b[0]===0x52 && b[1]===0x49 && b[2]===0x46 && b[3]===0x46 && b[8]===0x57 && b[9]===0x41 && b[10]===0x56 && b[11]===0x45 },
  { ext: "flac", test: b => b[0]===0x66 && b[1]===0x4C && b[2]===0x61 && b[3]===0x43 },
  { ext: "ogg",  test: b => b[0]===0x4F && b[1]===0x67 && b[2]===0x67 && b[3]===0x53 },
  { ext: "aiff", test: b => b[0]===0x46 && b[1]===0x4F && b[2]===0x52 && b[3]===0x4D && b[8]===0x41 && b[9]===0x49 && b[10]===0x46 && b[11]===0x46 },
  { ext: "pdf",  test: b => b[0]===0x25 && b[1]===0x50 && b[2]===0x44 && b[3]===0x46 },
  { ext: "rtf",  test: b => b[0]===0x7B && b[1]===0x5C && b[2]===0x72 && b[3]===0x74 && b[4]===0x66 },
  { ext: "doc",  test: b => b[0]===0xD0 && b[1]===0xCF && b[2]===0x11 && b[3]===0xE0 && b[4]===0xA1 && b[5]===0xB1 && b[6]===0x1A && b[7]===0xE1 },
  { ext: null,   test: b => b[0]===0x50 && b[1]===0x4B && (b[2]===0x03 || b[2]===0x05 || b[2]===0x07),
    resolve: function(b) {
      const text = new TextDecoder("latin1").decode(b);
      if (text.includes("word/"))  return "docx";
      if (text.includes("xl/"))    return "xlsx";
      if (text.includes("ppt/"))   return "pptx";
      if (text.includes("META-INF/mozilla.rsa") || text.includes(".xpi")) return "xpi";
      if (text.includes("mimetype") && text.includes("epub")) return "epub";
      if (text.includes("AndroidManifest.xml")) return "apk";
      return "zip";
    }
  },
  { ext: "7z",   test: b => b[0]===0x37 && b[1]===0x7A && b[2]===0xBC && b[3]===0xAF && b[4]===0x27 && b[5]===0x1C },
  { ext: "rar",  test: b => b[0]===0x52 && b[1]===0x61 && b[2]===0x72 && b[3]===0x21 && b[4]===0x1A && b[5]===0x07 },
  { ext: "gz",   test: b => b[0]===0x1F && b[1]===0x8B },
  { ext: "bz2",  test: b => b[0]===0x42 && b[1]===0x5A && b[2]===0x68 },
  { ext: "xz",   test: b => b[0]===0xFD && b[1]===0x37 && b[2]===0x7A && b[3]===0x58 && b[4]===0x5A && b[5]===0x00 },
  { ext: "sqlite", test: b => {
      const s = "SQLite format 3";
      for (let i=0;i<s.length;i++) if (b[i]!==s.charCodeAt(i)) return false;
      return true;
    }
  },
  { ext: "ico",  test: b => b[0]===0x00 && b[1]===0x00 && b[2]===0x01 && b[3]===0x00 },
  { ext: "psd",  test: b => b[0]===0x38 && b[1]===0x42 && b[2]===0x50 && b[3]===0x53 },
  { ext: "wasm", test: b => b[0]===0x00 && b[1]===0x61 && b[2]===0x73 && b[3]===0x6D },
  { ext: "class",test: b => b[0]===0xCA && b[1]===0xFE && b[2]===0xBA && b[3]===0xBE },
  { ext: "exe",  test: b => b[0]===0x4D && b[1]===0x5A },
  { ext: "svg",  test: b => {
      const s = new TextDecoder("utf-8").decode(b.slice(0, 512)).trim().toLowerCase();
      return (s.startsWith("<?xml") && s.includes("<svg")) || s.startsWith("<svg");
    }
  },
  { ext: "html", test: b => {
      const s = new TextDecoder("utf-8").decode(b.slice(0, 512)).trim().toLowerCase();
      return s.startsWith("<!doctype html") || s.startsWith("<html") || s.startsWith("<head") || s.startsWith("<body");
    }
  },
  { ext: "xml",  test: b => {
      const s = new TextDecoder("utf-8").decode(b.slice(0, 64)).trim().toLowerCase();
      return s.startsWith("<?xml");
    }
  },
];

// ---------- Detection ----------
// Returns { ext, buf }. `ext` is the detected extension or null if no
// signature matched. `buf` is the first 4 KB so callers can further classify
// a null match (empty / plain-text / unknown binary).
async function detect(file) {
  const buf = new Uint8Array(await file.slice(0, 4096).arrayBuffer());
  for (const sig of SIGS) {
    try {
      if (sig.test(buf)) return { ext: sig.resolve ? sig.resolve(buf) : sig.ext, buf };
    } catch { /* ignore */ }
  }
  return { ext: null, buf };
}

// Heuristic: is the sample mostly printable ASCII (tab/LF/CR + 0x20–0x7e)?
// Anything over 90% is almost always a plain-text file of some kind.
function looksLikeText(buf) {
  if (buf.length === 0) return false;
  const n = Math.min(buf.length, 512);
  let printable = 0;
  for (let i = 0; i < n; i++) {
    const b = buf[i];
    if (b === 9 || b === 10 || b === 13 || (b >= 0x20 && b <= 0x7e)) printable++;
  }
  return printable / n > 0.9;
}

// ---------- DOM helpers ----------
function currentExt(name) {
  const i = name.lastIndexOf(".");
  return i < 1 ? "" : name.slice(i+1).toLowerCase();
}
function stem(name) {
  const i = name.lastIndexOf(".");
  return i < 1 ? name : name.slice(0, i);
}
function normalize(ext) {
  if (!ext) return ext;
  const map = { jpeg: "jpg", tif: "tiff", htm: "html", mpeg: "mpg" };
  return map[ext] || ext;
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
// FilePond fires onaddfile for each file individually; batch them so the
// success flash covers the whole drop instead of retriggering per file.
const batch = [];
let batchTimer = null, successTimer = null;

window.queueFile = function (file) {
  batch.push(file);
  clearTimeout(batchTimer);
  batchTimer = setTimeout(processBatch, 120);
};

// Failure taxonomy. Severity order = the order we prefer to surface a mixed
// batch's problem; a worse issue in any one file overrides a milder one.
const FAIL_MESSAGES = {
  unreadable: "could not read file",
  empty:      "file is empty",
  corrupt:    "unknown format",
  text:       "looks like plain text",
};
const FAIL_SEVERITY = ["unreadable", "empty", "corrupt", "text"];

async function processBatch() {
  const files = batch.splice(0);
  let fixedCount = 0;
  let failReason = null;
  const raise = r => {
    if (!failReason || FAIL_SEVERITY.indexOf(r) < FAIL_SEVERITY.indexOf(failReason)) {
      failReason = r;
    }
  };

  for (const file of files) {
    if (file.size === 0) { raise("empty"); continue; }
    let result;
    try { result = await detect(file); }
    catch { raise("unreadable"); continue; }

    const detected = normalize(result.ext);
    if (!detected) {
      raise(looksLikeText(result.buf) ? "text" : "corrupt");
      continue;
    }
    if (normalize(currentExt(file.name)) !== detected) {
      downloadBlob(file, `${stem(file.name)}_fixed.${detected}`);
      fixedCount++;
      await new Promise(r => setTimeout(r, 80));
    }
  }
  window._pond?.removeFiles();

  // Success wins if anything was fixed OR every file already had the right ext.
  const root = document.querySelector(".filepond--root");
  const status = document.querySelector(".status");
  if (fixedCount > 0 || !failReason) {
    status.textContent = "done";
    status.className = "status done";
    root.classList.add("success");
  } else {
    status.textContent = FAIL_MESSAGES[failReason];
    status.className = "status fail";
  }
  clearTimeout(successTimer);
  successTimer = setTimeout(() => {
    root.classList.remove("success");
    status.className = "status";
  }, 3000);
}

// Center [tractor][space]Diane's File Fixer on the upper arc after Orbitron
// loads, then push the tractor 8 user-units radially outward (arc radius 175,
// centered at 260,260) so its wheels clear the drop-zone rim.
document.fonts.ready.then(() => {
  const path = document.getElementById("title-arc");
  const text = document.querySelector(".h1-curve text");
  const textLen = text.getComputedTextLength();
  if (!textLen) return;

  const a = text.getStartPositionOfChar(7), b = text.getStartPositionOfChar(8);
  const spaceW = Math.hypot(b.x - a.x, b.y - a.y);
  const TRACTOR_W = 38; // 40-unit artwork * scale(0.95)
  const start = (path.getTotalLength() - TRACTOR_W - spaceW - textLen) / 2;

  text.querySelector("textPath").setAttribute(
    "startOffset", start + TRACTOR_W + spaceW + textLen / 2);

  const p = path.getPointAtLength(start + TRACTOR_W / 2);
  const q = path.getPointAtLength(start + TRACTOR_W / 2 + 1);
  const angle = Math.atan2(q.y - p.y, q.x - p.x) * 180 / Math.PI;
  const k = 1 + 8 / 175;
  const x = 260 + (p.x - 260) * k, y = 260 + (p.y - 260) * k;

  document.querySelector(".h1-curve .tractor").setAttribute(
    "transform", `translate(${x} ${y}) rotate(${angle}) translate(-32 -32) scale(0.95)`);
});
</script>
</body>
</html>
